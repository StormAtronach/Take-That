nexusDescription="[b][size=4]Take That!  [/size][/b]\n<br />[size=2]A Modern Combat Mod for Morrowind by Storm Atronach[/size]\n<br />\n<br />[b]Take That![/b] is a timing-based melee combat overhaul for [i]The Elder Scrolls III: Morrowind[/i], introducing reactive mechanics like [b]blocking, parrying, dodging, and spell batting[/b]. Designed for players who want a more engaging and skillful combat experience, each feature rewards precision, awareness, and smart character builds.\n<br />\n<br />[b]Update! [/b]A new parry system has been implemented. Due to the lightning fast attack animations in Morrowind, timing parries was extremely dificult. Now, a little bit of time wizardry is applied - when the enemy starts their attack, if you have your weapon fully charged, a subtle and brief slowdown effect will be applied - just enough to allow for parries without breaking the flow of combat.\n<br />\n<br />Mechanics\n<br />[b] 1. Blocking[/b]\n<br />- Block Window: Press your chosen hotkey to enter a brief block window (default: 1s, key: b).\n<br />- Cooldown: Blocking has a configurable cooldown (default: 3s).\n<br />- Types:  \n<br />[b]A - Sword &amp; Board[/b]: Block with a shield and one-handed weapon. The leveling mechanics are:\n<br />   ﻿- Damage reduction: starts at 50%, and scales with half your block skill. At Master (100), damage when sucessfully blocking is reduced to 0.\n<br />   - Perks:\n<br />      ﻿﻿- Novice (0-24), a sucessful block will briefly stun the opponent.\n<br />      ﻿﻿- Apprentice (25-49), a sucessful block will also reduce their speed by 25% for 2 seconds\n<br />      ﻿﻿- Journeyman (50-74), the opponent is slowed by 50%\n<br />      ﻿﻿- Expert (75-99), the opponent speed is reduced by 75%\n<br />      ﻿﻿- Master (100), the opponnent is stopped for 2 seconds.\n<br />   ﻿- Progression Each successful block gives block skill xp.\n<br />[b]B - Weapon[/b]: Block with a two-handed weapon or one-handed weapon without a shield (or while dual wielding weapons if you are using Double Chim).\n<br />   ﻿- Damage reduction: Starts at 20% and scales with 0.6*your weapon skill. At Master level, damage is reduced by 80% when blocking with a weapon.\n<br />   ﻿- Perks: Same as sword and boad.\n<br />   ﻿- Progression: Each successful block will increase your weapon skill.\n<br />   ﻿- [u]Alternative mode[/u]: If you activate it in the MCM, your block skill will contribute to the damage reduction. Each successful block will raise your block skill instead.\n<br />\n<br />[b]C - [/b][b]Unarmed (Kung Fu)[/b]: Block with empty hands (and no shield!).\n<br />   ﻿- Damage reduction: No damage reduction at novice and apprentice, jumps to 50% at journeyman, 75% at expert and at Master level, damage is reduced to 0.\n<br />   ﻿- Perks:\n<br />   ﻿   ﻿- Novice and apprentice: Brief stun\n<br />   ﻿   ﻿- Journeyman: Enemy is knocked down and speed reduced by 25% for 2 seconds\n<br />   ﻿   ﻿- Expert: Nerve attack! enemy is knocked down and paralyzed for 5 seconds\n<br />   ﻿   ﻿- Master: Death touch! Enemy is knocked down, paralyzed for 5 seconds, and takes 20 points of poison damage for 5 seconds.\n<br />\n<br />[b]2. Parrying[/b]\n<br />- How: Perform a power attack (fully drawn) to enter a parry window which will last until the end of your swing.\n<br />- Cooldown: Cooldown has been removed.\n<br />- Effect: If hit during the window, the attack is negated and an opposed skill check occurs.\n<br />Opposed Skill Check:\n<br />Player Skill Level = floor(Weapon Skill / 25)\n<br />Attacker Skill Level = floor(Weapon Skill / 25)\n<br />Result = Player Skill Level - Attacker Skill Level\n<br />- If Result is less than 0, both attacker and player are stunned.\n<br />- If Result is 0, only the attacker is stunned.\n<br />- If result is 1, the attacker is stunned and slowed 25% for 1 second\n<br />- At 2, the attacker is knocked down and slowed 50% for 1 second\n<br />- At 3, the attacker is knocked down and slowed 75% for 1 second\n<br />- [b]Option: [/b]NPCs can parry the player for an interesting challenge! You can enable this in the MCM\n<br />\n<br />- As a bonus, you can try your luck batting arrows just as they're about to hit you!\n<br />\n<br />\n<br />[b]3. Dodging[/b]\n<br />- How: Jump to dodge (if not on cooldown).\n<br />- Window: Dodge duration scales with Acrobatics and armor weight:\n<br />  Dodge Duration = clamp(0.1 + (Acrobatics Level / 10) + Armor Contribution, 0.1, 1)\n<br />  No armor = +0.5s, Light armor = +0.35s, Medium = +0.2s, Heavy = 0, \n<br />- Effect: Grants Sanctuary (100%) for the dodge window.\n<br />- Cooldown: Configurable (default: 3s).\n<br />\n<br />[b]4. Spell Batting[/b]\n<br />- How: Perform a power attack with sufficient weapon skill (configurable minimum).\n<br />- Window: After a short delay, you gain a brief Reflect or Shield effect (configurable window).\n<br />- Effect: Incoming spells can be reflected if they hit during this window.\n<br />\n<br />[b]Bonus[/b]: If you have MM Enhanced Reflection installed, the shield reflect mechanic from that mod will apply.\n<br />\n<br />[b]Additional Features[/b]\n<br />- Configurable Hotkey: Choose your block hotkey in the MCM. Now mouse keys are also possible!\n<br />- Restore Defaults: Easily reset all settings in the MCM.\n<br />\n<br />[b]Configuration[/b]\n<br />All timings, skill multipliers, and thresholds can be adjusted in the MCM.  \n<br />Default values are balanced for a challenging but fair experience.\n<br />\n<br />[b]Requirements[/b]\n<br />- MWSE (latest nightly)\n<br />- Optional: MM Enhanced Reflection\n<br />\n<br />[b]Credits[/b]\n<br />MWSE Team and particularly Greatness7, without whose guidance this mod would not have been possible!\n<br />Codering for taking my single file monstruosity and exploding it into multiple files, making progress faster!\n<br />Special thanks to the Morrowind modding community, Yoshiyuki Saito, and Unicorn for the inspiration and insights!\n<br />\n<br />Take That and Have fun!\n<br />[img]https://i.imgur.com/OmI4TwM.png[/img]\n<br />[img]https://i.imgur.com/ziZJ0LF.png[/img]\n<br />[img]https://i.imgur.com/lg7fEsd.png[/img]\n<br />[img]https://i.imgur.com/CzVLzrG.png[/img]\n<br />[img]https://i.imgur.com/NrZQJzQ.png[/img]\n<br />[img]https://i.imgur.com/T4XZdA3.png[/img]\n<br />\n<br />[img]https://i.imgur.com/Rw9eTpF.png[/img]"
